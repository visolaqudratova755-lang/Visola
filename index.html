!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visola Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4e73df, #1cc88a);
            color: white;
            text-align: center;
        }

        header {
            padding: 60px 20px;
        }

        header h1 {
            font-size: 40px;
        }

        header p {
            font-size: 18px;
            margin-top: 10px;
        }

        section {
            padding: 40px 20px;
            background: white;
            color: #333;
            margin: 20px;
            border-radius: 15px;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background: #4e73df;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            margin-top: 15px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #2e59d9;
        }

        footer {
            padding: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<header>
    <h1>Salom, Men Visola 👋</h1>
    <p>Mening shaxsiy veb-saytimga xush kelibsiz</p>
    <a href="#about" class="btn">Batafsil</a>
</header>

<section id="about">
    <h2>Men haqimda</h2>
    <p>Men dasturlash va IT sohasiga qiziqaman. Bu mening birinchi GitHub sahifam.</p>
</section>

<section>
    <h2>Aloqa</h2>
    <p>Email: example@gmail.com</p>
</section>

<footer>
    © 2026 Visola Portfolio
</footer>

</body>
</html>
